<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech.Chebur.Shop Solutions</title>
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            line-height: 1.6; 
            color: #fff; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 20px; 
            background: url('background.jpg') no-repeat center center fixed; 
            background-size: cover; 
            background-color: #0a0a0a; 
        }
        
        header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        
        .logo { 
            width: 300px; 
            display: block; 
            margin: 0 auto 10px auto;
            filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.3));
        }

        .lang-switch { text-align: center; margin-bottom: 20px; }
        .lang-switch a { cursor: pointer; color: #00ffff; text-decoration: underline; margin: 0 10px; font-weight: bold; }
        
        .project-card { 
            background: rgba(20, 20, 20, 0.85); 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.15); 
            margin-bottom: 20px; 
            border: 1px solid #444;
        }
        .project-card h2 { margin-top: 0; color: #00ffff; }
        .project-card a { color: #00ffff; text-decoration: none; font-weight: bold; }
        .project-card a:hover { text-decoration: underline; }
        
        footer { margin-top: 50px; font-size: 0.9em; text-align: center; color: #888; }
    </style>
</head>
<body>

    <div class="lang-switch">
        <a onclick="setLang('ru')">RU</a> | <a onclick="setLang('de')">DE</a>
    </div>

    <header>
        <img src="logo.png" alt="Tech.Chebur.Shop" class="logo">
        <p id="subtitle">Мониторинг и технические системы</p>
    </header>

    <div class="project-card">
        <h2 id="gps-title">GPS Трекинг</h2>
        <p id="gps-desc">Система профессионального мониторинга и безопасности.</p>
        <a href="/tracker-login" id="gps-link">Перейти к панели управления</a>
    </div>

    <div class="project-card">
        <h2 id="arch-title">Технический Архив</h2>
        <p id="arch-desc">Логи, конфигурации и документация проектов.</p>
        <a href="/archive" id="arch-link">Открыть архив</a>
    </div>

    <footer>
        &copy; 2026 Fedir Cheburaschkin. Uetersen, Germany.
    </footer>

    <script>
        const content = {
            ru: {
                subtitle: "Tech.Chebur.Shop Salutations",
                gpsTitle: "GPS Трекинг",
                gpsDesc: "Система профессионального мониторинга и безопасности.",
                gpsLink: "Перейти к панели управления",
                archTitle: "Технический Архив",
                archDesc: "Логи, конфигурации и документация проектов.",
                archLink: "Открыть архив"
            },
            de: {
                subtitle: "Überwachung und technische Systeme",
                gpsTitle: "GPS-Tracking",
                gpsDesc: "Professionelles Überwachungs- und Sicherheitssystem.",
                gpsLink: "Zum Kontrollpanel",
                archTitle: "Technisches Archiv",
                archDesc: "Protokolle, Konfigurationen und Projektdokumentation.",
                archLink: "Archiv öffnen"
            }
        };

        function setLang(lang) {
            document.getElementById('subtitle').innerText = content[lang].subtitle;
            document.getElementById('gps-title').innerText = content[lang].gpsTitle;
            document.getElementById('gps-desc').innerText = content[lang].gpsDesc;
            document.getElementById('gps-link').innerText = content[lang].gpsLink;
            document.getElementById('arch-title').innerText = content[lang].archTitle;
            document.getElementById('arch-desc').innerText = content[lang].archDesc;
            document.getElementById('arch-link').innerText = content[lang].archLink;
        }
    </script>
</body>
</html>
